name: CI/CD for notes test
on:
  push:
    branches:
      - main
jobs:
  develop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Build image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/notes_test:latest .
      - name: Push Image
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/notes_test:latest
      - name: EC2 Login
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_KEY}}
          script: |
            cd /home/ubuntu
            docker pull compose
            docker compose up -d
